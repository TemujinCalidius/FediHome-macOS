# XcodeGen spec — the committed source of truth for the Xcode project.
# Regenerate the (git-ignored) .xcodeproj with:  xcodegen generate
name: FediHome
options:
  bundleIdPrefix: social.fedihome
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  FediHomeKit:
    path: Packages/FediHomeKit
targets:
  FediHome:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: App
    dependencies:
      - package: FediHomeKit
        product: FediHomeKit
    scheme:
      testTargets: []
      gatherCoverageData: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: social.fedihome.macos
        PRODUCT_NAME: FediHome
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/FediHome.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: "YES"
