name: CI

# Build the app + run the FediHomeKit package tests on every PR to (and push to)
# dev/main. The Xcode project is git-ignored and generated from project.yml via
# XcodeGen, so we generate it first.
on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16 (Swift 6 toolchain)
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Package tests
        run: swift test --package-path Packages/FediHomeKit

      - name: Build app
        run: |
          xcodebuild \
            -project FediHome.xcodeproj \
            -scheme FediHome \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" \
            build
